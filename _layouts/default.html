
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{page.title}}</title>
	<link href="/assets/css/styles.css" rel="stylesheet" type="text/css">
    <script>
        let sidebarOpened = false;

        toggleSidebar = function () {
            sidebarOpened = !sidebarOpened;

            const sidebar = document.getElementById('sidebar');
            const sidebarBtn = document.getElementById('sidebar-btn');
            const overlay = document.getElementById('overlay');

            if (!sidebarOpened) {
                sidebar.classList.add('navigation--closed');
                overlay.classList.add('overlay--closed');
                sidebarBtn.classList.remove('header__toggle--active');

            } else {
                sidebar.classList.remove('navigation--closed');
                overlay.classList.remove('overlay--closed');
                sidebarBtn.classList.add('header__toggle--active');
            }
        };
    </script>
</head>
<body>
    <div class="header">
        <div class="header__close" onclick="toggleSidebar()">
            <div id="sidebar-btn" class="header__toggle">
                <div></div>
            </div>
        </div>
        <h1>
            {{ site.title }}
        </h1>
    </div>
    <div id="sidebar" class="navigation navigation--closed">
        <div class="header header--sidebar">
            <h1>
                {{ site.title }}
            </h1>
        </div>
        <div class="navigation__top"></div>
        <div class="navigation__title">
            <h1>
                {{ site.title }}
            </h1>
        </div>
        <div class="navigation__menu">
            {% include menu.html %}
        </div>
        <div class="navigation__bottom"></div>
    </div>
    <div id="overlay" class="overlay overlay--closed"></div>
    <div class="content">
        {{ content }}
    </div>
</body>
</html>
