<!DOCTYPE html>
{% assign lang = page.lang | default: site.lang | default: 'en' %}
{% assign translations = site.data.translations %}
<html lang="{{ lang }}">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#323232">
    <meta name="msapplication-TileColor" content="#323232">
    <link rel="icon" type="image/png" sizes="32x32" href="/data/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="/data/logo.png">

    <title>
        {{ site.title }}
        {% if page.title %}
         - {{ page.title }}
        {% endif %}
    </title>
	<link rel="stylesheet" type="text/css" href="/assets/css/styles.css" >
    <!-- <link rel="stylesheet" type="text/css" href="{{ "/assets/css/style.css" | relative_url }}"> -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Montserrat">
    <script>
        let sidebarOpened = false;

        toggleSidebar = function () {
            sidebarOpened = !sidebarOpened;

            const sidebar = document.getElementById('sidebar');
            const sidebarBtn = document.getElementById('sidebar-btn');
            const overlay = document.getElementById('overlay');

            if (!sidebarOpened) {
                sidebar.classList.add('navigation--closed');
                overlay.classList.add('overlay--closed');
                sidebarBtn.classList.remove('header__toggle--active');

            } else {
                sidebar.classList.remove('navigation--closed');
                overlay.classList.remove('overlay--closed');
                sidebarBtn.classList.add('header__toggle--active');
            }
        };

        /*
        function walkText(node) {
            node.data = node.data.replace(/\[\[.*[a-zA-Z]+.*\]]/g, "TESTTEST");
            for (var i = 0; i < node.childNodes.length; i++) {
                walkText(node.childNodes[i]);
            }
        }
        walkText(document.firstChild);
        */
    </script>
</head>
<body id="[[ test ]]">
    <div class="header">
        <div class="header__close" onclick="toggleSidebar()">
            <div id="sidebar-btn" class="header__toggle">
                <div></div>
            </div>
        </div>
        <img src="/data/logo.svg" alt="{{ site.title }}"/>
        <h1>
            {{ site.title }}
        </h1>
    </div>
    <div id="sidebar" class="navigation navigation--closed">
        <div class="navigation__top"></div>
        <div class="navigation__logo">
            <img src="/data/logo.svg" alt="{{ site.title }}"/>
        </div>
        <div class="navigation__menu">
            [[ test ]]
            {% include menu.html %}
        </div>
        <div class="navigation__bottom"></div>
    </div>
    <div id="overlay" class="overlay overlay--closed"></div>
    <main class="content">
        {{ content }}
    </main>
</body>
</html>
