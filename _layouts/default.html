
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{page.title}}</title>
	<link href="/assets/css/styles.css" rel="stylesheet" type="text/css">
    <script>
        let navbarOpened = true;

        toggleNavbar = function () {
            navbarOpened = !navbarOpened;

            const navbar = document.getElementById('navbar');
            const navbarBtn = document.getElementById('navbar-btn');

            if (!navbarOpened) {
                navbar.classList.add('navigation--closed');
                navbarBtn.textContent = '>';

            } else {
                navbar.classList.remove('navigation--closed');
                navbarBtn.textContent = 'X';
            }
        }
    </script>
</head>
<body>
    <div class="header">
        <div id="navbar-close" class="header__close">
            <button id="navbar-btn" onclick="toggleNavbar()">
                X
            </button>
        </div>


    </div>
    <div id="navbar" class="navigation">
        <div class="navigation__top"></div>
        <div class="navigation__title">
            <h1>
                {{ site.title }}
            </h1>
        </div>
        <div class="navigation__menu">
            {% include navbar.html %}
        </div>
        <div class="navigation__bottom"></div>
    </div>
    <div class="content">
        {{ content }}
    </div>
</body>
</html>
