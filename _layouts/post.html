---
layout: default
---

<article>
    {% if page.title%}
    <h1>{{page.title}}</h1>
    {% else %}
    <h1>Untitled post</h1>
    {% endif %}

    <div>
        {{ page.date | date_to_string }}
    </div>

    <div>
        {% for tag in page.tags %}
        {% capture tag_name %}{{ tag }}{% endcapture %}
        <a href="/tags/{{ tag_name }}">
            {{ tag_name }}
        </a>
        {% endfor %}
    </div>

    <p>
        {{ content }}
    </p>
</article>
