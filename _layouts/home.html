---
layout: default
---

<div class="home">
    {% for post in site.posts %}

    <article>
        <h2>
            {{post.title}}
        </h2>

        <h6>{{ post.date | date_to_string }}</h6>

        <p>
            {{ post.description }}
        </p>

        <a href="{{ post.url | relative_url }}">Read more...</a>
    </article>

    {% endfor %}
</div>
