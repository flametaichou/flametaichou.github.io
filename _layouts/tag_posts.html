<h1>{{ page.title }}</h1>


<div class="tag_posts">

        {% include all_tags.html %}
    </div>

    {% for post in site.tags[page.tag] %}

        {% include components/post_preview.html
            post = post
        %}

    {% endfor %}
</div>
