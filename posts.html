---
layout: default
title: Posts
description: All posts
---

<h1>{{ page.title }}</h1>

<div class="home">
    {% for post in site.posts %}

    <article>
        <h2>
            {{post.title}}
        </h2>

        <div>{{ post.date | date_to_string }}</div>

        <p>
            {{ post.description }}
        </p>

        <div>
            {% for tag in post.tags %}
            <a href="/tags/{{ tag | slugify }}">
                {{ tag }}
            </a>
            {% endfor %}
        </div>

        <a href="{{ post.url | relative_url }}">Read more...</a>
    </article>

    {% endfor %}
</div>
