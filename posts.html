---
layout: default
title: Posts
description: All posts
---

<h1>{{ page.title }}</h1>

<div class="home">
    {% for post in site.posts %}

    <article class="post">
        <div class="post__title">
            <span class="post__category">{{ post.category }}</span>
            /
            <span class="post__date">{{ post.date | date_to_string }}</span>
        </div>

        <h2>
            {{post.title}}
        </h2>

        <p>
            {{ post.description }}
        </p>

        <div>
            {% for tag in post.tags %}
            <a href="/tags/{{ tag | slugify }}" class="tag">
                {{ tag }}
            </a>
            {% endfor %}
        </div>

        <div class="post__actions">
            <a href="{{ post.url | relative_url }}">Read more...</a>
        </div>
    </article>

    {% endfor %}
</div>
