---
layout: default
title: Posts
description: All posts
---

<div class="home">
    {% for post in site.posts %}

    <article>
        <h2>
            {{post.title}}
        </h2>

        <div>{{ post.date | date_to_string }}</div>

        <p>
            {{ post.description }}
        </p>

        <a href="{{ post.url | relative_url }}">Read more...</a>
    </article>

    {% endfor %}
</div>
