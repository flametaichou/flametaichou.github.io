<nav>
    {{ page.tag }}

    {% for tag in site.tags %}
    {% assign tag_str = tag | first %}
    <a href="/tags/{{ tag | first | slugify }}/" class="tag{% if page.tag == tag_str %} tag--active {% endif %}">
        {{ tag | first }}
        ({{ tag | last | size }})
    </a>
    {% endfor %}
</nav>
